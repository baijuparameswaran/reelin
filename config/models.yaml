# ─────────────────────────────────────────────────────────────────────────────
# Local model configuration for the reel screenplay-conversion agents.
#
# Agents request a *profile* (a quality tier), never a hard-coded model name.
# This keeps the whole pipeline model-agnostic: swap a bigger model the day a
# GPU/cloud box is available by editing this file only.
#
# If a profile's preferred `model` isn't pulled yet, the client transparently
# falls back to the first installed entry in `fallbacks`, so the pipeline always
# runs on whatever local models exist. Run `scripts/update-models.sh` to pull
# the preferred models (and keep them current on a cadence).
# ─────────────────────────────────────────────────────────────────────────────

ollama_host: http://localhost:11434

# Human-in-the-loop gate (applied after every LLM stage).
# Set enabled: false for fully automated / batch runs.
# timeout_seconds: auto-approve after N seconds idle (0 = wait forever).
hitl:
  enabled: true
  timeout_seconds: 120

# Text-to-image rendering for the casting stage (a basic portrait per character,
# saved to output/casting/<name>.png and linked from casting details). This is a
# different modality than Ollama, so it uses its own backend — see reel/imagegen.py.
#   backend: diffusers  -> in-process via diffusers+torch (optional deps:
#                          `pip install -r requirements-image.txt`).
#                          CPU-friendly model: stabilityai/sd-turbo (few-step).
#                          GPU hosts: swap model to SDXL or FLUX.1-schnell.
#            auto1111    -> HTTP to a running AUTOMATIC1111 / SD.cpp server (host).
#            none        -> disable.
# Best-effort: if the backend isn't available the run continues and just keeps
# each character's text visual_prompt.
image:
  enabled: true
  backend: diffusers
  model: stabilityai/sd-turbo
  host: http://localhost:7860     # used by the auto1111 backend
  steps: 4
  size: 512
  guidance_scale: 0.0             # sd-turbo wants 0.0; raise (~7) for SDXL/SD1.5
  negative_prompt: "lowres, deformed, extra limbs, text, watermark, blurry"
  style_suffix: "character concept portrait, full figure, plain neutral background, soft studio light"
  timeout_seconds: 600

# Runtime behavior.
runtime:
  # How many agents may call models concurrently. On CPU-only / low-RAM hosts a
  # single model serves requests sequentially and loading two different models
  # at once OOMs, so keep this at 1 here. Raise it on a GPU/multi-model box to
  # actually parallelize the independent branches (structure ‖ characters).
  max_parallel_agents: 1

  # Generation is streamed, so this is an *inactivity* timeout: the max seconds
  # to wait for the next token before treating the daemon as hung. It does NOT
  # cap total generation time. The largest gap is usually time-to-first-token,
  # which includes (re)loading the model into RAM and prefilling the prompt on
  # CPU — slowest for the heavy storyboard stage, and worse if the model was
  # unloaded during a long review-gate pause. Keep this comfortably above that.
  # Set to 0 to wait indefinitely (fine for batch jobs — Ctrl-C still pauses).
  request_timeout_seconds: 600

# Qwen3 requires a newer Ollama than 0.6.5. The update script checks this and
# tells you how to upgrade if needed. (Soft floor; updater always pulls latest.)
min_ollama_version: "0.7.0"

profiles:
  # Fast tier — default for iteration on modest CPU-only hardware.
  fast:
    model: qwen3:4b
    fallbacks: [qwen2.5:latest, mistral:7b-instruct, phi3:mini]
    options:
      temperature: 0.7
      num_ctx: 4096

  # Quality tier — slower, better structure/instruction-following.
  # Comfortable after bumping WSL RAM to ~12 GB (see CLAUDE.md).
  quality:
    model: qwen3:8b
    fallbacks: [llama3:8b, qwen2:7b-instruct-q5_K_M, qwen2.5:latest]
    options:
      temperature: 0.8
      num_ctx: 4096

# Default profile each agent uses (override per run with `--profile`).
agent_profiles:
  structure:       quality
  characters:      fast
  casting:         fast
  scenes:          fast
  soundscape:      fast
  visuals:         fast
  cinematography:  fast
  storyboard:      quality
  screenplay:      quality
