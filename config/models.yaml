# ─────────────────────────────────────────────────────────────────────────────
# Local model configuration for the reel screenplay-conversion agents.
#
# Agents request a *profile* (a quality tier), never a hard-coded model name.
# This keeps the whole pipeline model-agnostic: swap a bigger model the day a
# GPU/cloud box is available by editing this file only.
#
# If a profile's preferred `model` isn't pulled yet, the client transparently
# falls back to the first installed entry in `fallbacks`, so the pipeline always
# runs on whatever local models exist. Run `scripts/update-models.sh` to pull
# the preferred models (and keep them current on a cadence).
# ─────────────────────────────────────────────────────────────────────────────

ollama_host: http://localhost:11434

# Human-in-the-loop gate (applied after every LLM stage).
# Set enabled: false for fully automated / batch runs.
# timeout_seconds: auto-approve after N seconds idle (0 = wait forever).
hitl:
  enabled: true
  timeout_seconds: 120

# Character image generation — ONE image per character (the character
# representation), saved to output/casting/<name>.png and used as the identity
# reference for the video stage. Different modality than Ollama — see
# reel/imagegen.py. Default backend is the Gemini API (needs an API key in env:
# GEMINIAPIKEY, or GEMINI_API_KEY/GOOGLE_API_KEY).
#   backend: gemini    -> Google Gemini image API (no extra Python deps).
#                         docs: ai.google.dev/gemini-api/docs/image-generation
#            diffusers -> in-process via diffusers+torch (requirements-image.txt).
#            auto1111  -> HTTP to an AUTOMATIC1111 / SD.cpp server (host).
#            none      -> disable.
# Best-effort: if the backend isn't available (e.g. no API key) the run continues
# and just keeps each character's text visual_prompt.
image:
  enabled: true
  backend: auto                   # auto = Gemini if GEMINIAPIKEY set, else open_backend
  open_backend: diffusers         # the OPEN fallback when no Gemini key (diffusers|auto1111|none)
  model: gemini-3.1-flash-image   # gemini-3-pro-image / gemini-2.5-flash-image
  # NB: the v1 :generateContent image endpoint rejects extra generationConfig
  # fields (responseModalities / responseFormat / imageConfig), so the request is
  # kept minimal (matches the official text-to-image sample). Steer framing /
  # aspect via the prompt text instead.
  timeout_seconds: 300
  # --- diffusers / auto1111 backends (only used if backend above is changed) ---
  host: http://localhost:7860     # auto1111 backend
  steps: 4
  size: 512
  width: 512
  height: 768
  guidance_scale: 0.0
  negative_prompt: "lowres, deformed, extra limbs, text, watermark, blurry"
  style_suffix: "character portrait, plain neutral background, soft studio light"
  img2img_strength: 0.55

# Scene rendering — image-to-video (the next phase, after storyboard + screenplay).
# Renders each storyboard frame as a clip, seeded by the in-frame character's
# representation image (the reference from the image stage) and chained for
# continuity within a scene. Default backend is the Gemini Veo API (image-to-
# video; needs the same API key in env). Best-effort: with no key/backend the run
# continues without clips.
#   backend: gemini|veo -> Google Veo via the Gemini API (no extra Python deps).
#                          docs: ai.google.dev/gemini-api/docs/video
#            diffusers   -> in-process on a GPU host (LTX/Wan via pipeline_class).
#            comfyui|http-> POST keyframe image(s)+prompt to a remote GPU endpoint.
#            none        -> disabled.
video:
  enabled: true
  backend: auto                   # auto = Gemini Veo if GEMINIAPIKEY set, else open_backend
  open_backend: diffusers         # the OPEN fallback when no Gemini key (diffusers|comfyui|none)
  model: veo-3.1-fast-generate-preview   # veo-3.1-generate-preview / -lite-generate-preview
  aspect_ratio: "16:9"
  resolution: "720p"
  continuity: true                # chain each clip from the previous frame's last image
  style_suffix: "cinematic, smooth natural motion, consistent character"
  poll_seconds: 10
  timeout_seconds: 1200
  # --- diffusers / comfyui backends (only used if backend above is changed) ---
  pipeline_class: LTXImageToVideoPipeline
  host: http://localhost:8188
  endpoint: ""
  seconds: 4
  fps: 24
  size: 768
  # --- clip overlays (requires ffmpeg on PATH) ---
  # When enabled, each rendered shot clip gets text burned in via ffmpeg drawtext:
  #   subtitles — dialogue lines shown centred at the bottom (caption style)
  #   shot_info — scene/shot/type label shown top-left (useful for dailies review)
  # Overlay is applied in-place after the Veo clip is downloaded, before stitching.
  overlays:
    enabled: false        # set true to burn overlays onto every shot clip
    subtitles: true       # show dialogue lines as centred captions at the bottom
    shot_info: true       # show "SN·FN·TYPE" label top-left
    font_size: 24
    subtitle_color: "white"
    label_color: "yellow"

# Story-fidelity checking. After each stage is approved, the fidelity agent checks
# that stage's output stays consistent with the ORIGINAL story (runs on the OPEN
# models, per policy — never Gemini). Per-stage reports land in output/fidelity/;
# the aggregate score + verdict go in output/fidelity.json and project.json.
#   Overall score = round(0.5*mean + 0.5*min) of the per-stage 0-100 scores
#   (the weakest stage caps consistency). Verdict: >=85 aligned, 70-84 mostly
#   aligned, 50-69 drifting, <50 misaligned.
fidelity:
  per_stage: true   # set false to skip per-stage checks (faster runs)
  min_score: 70     # at the review gate, scores below this flag a re-iterate hint

# Genre alignment. The genre agent fixes ONE genre for the run — from `value`
# (an explicit genre name), or inferred from the storyline when `value: auto`
# (the CLI `--genre NAME` overrides both). It then (a) STEERS every creative
# stage: its conventions are injected into each stage's prompt; and (b) ENFORCES
# alignment: after each stage the agent scores how on-genre the output is, shown
# at the review gate (below `min_score` flags a re-iterate hint). Runs on the OPEN
# models, per policy — never Gemini. Per-stage reports land in output/genre/; the
# resolved spec in output/genre.json; the aggregate in output/genre_alignment.json.
genre:
  value: auto       # explicit genre name, or "auto" to infer from the storyline
  steer: true       # inject genre conventions into each creative stage's prompt
  enforce: true     # per-stage genre-alignment checks (set false for faster runs)
  min_score: 70     # at the review gate, scores below this flag a re-iterate hint

# Moodboard. After structure, the moodboard agent fixes the film-wide visual-tone
# bible (color story, lighting mood, textures, atmosphere, influences) from the
# story + genre, and folds it into the steering direction so every creative stage
# below — casting, soundscape, visuals, cinematography, screenplay, storyboard —
# composes toward one look. Reviewed at its own gate; saved to output/moodboard.json.
# Runs on the OPEN models, per policy — never Gemini.
moodboard:
  enabled: true     # set false to skip the moodboard stage entirely
  steer: true       # fold the moodboard into the creative-direction steering

# Runtime behavior.
runtime:
  # How many agents may call models concurrently. On CPU-only / low-RAM hosts a
  # single model serves requests sequentially and loading two different models
  # at once OOMs, so keep this at 1 here. On a GPU host with enough VRAM to hold
  # two models, raise to 2-4 to actually parallelize the independent branches
  # (structure ‖ characters, scenes ‖ casting, soundscape ‖ visuals ‖ cinematography).
  max_parallel_agents: 2   # RTX 2070 8 GB holds two 4B models simultaneously

  # Generation is streamed, so this is an *inactivity* timeout: the max seconds
  # to wait for the next token before treating the daemon as hung. It does NOT
  # cap total generation time. The largest gap is usually time-to-first-token,
  # which includes (re)loading the model into RAM and prefilling the prompt on
  # CPU — slowest for the heavy storyboard stage, and worse if the model was
  # unloaded during a long review-gate pause. Keep this comfortably above that.
  # Set to 0 to wait indefinitely (fine for batch jobs — Ctrl-C still pauses).
  # On GPU (RTX 2070) first-token latency is ~2–5 s vs ~30–60 s on CPU, so
  # 120 s is plenty. Keep higher if falling back to CPU (e.g. gemma3:12b overflow).
  request_timeout_seconds: 360

  # Let thinking models (e.g. Qwen3) emit their reasoning trace before answering.
  # Enabled: Qwen3 reasons before producing the final JSON (better structure/
  # instruction-following). NB on a CPU-only host this is much slower — the
  # reasoning stream adds many tokens per stage (a single stage can take 15-20 min).
  # Set false to skip thinking for faster (lower-reasoning) runs.
  think: true

  # GPU layer offload for Ollama (the `num_gpu` request option).
  #   -1 / unset : Ollama auto-detects CUDA/ROCm and offloads as many layers
  #                as VRAM allows — this is the default and usually what you want.
  #    0          : force CPU-only (useful to compare speed or free VRAM for
  #                 something else while the pipeline runs).
  #    N > 0      : offload exactly N transformer layers to GPU (partial offload
  #                 when the model is larger than VRAM — the rest runs on CPU).
  #
  # WSL2 + NVIDIA RTX 2070 Super (8 GB VRAM, this host):
  #   Ollama picks up the GPU via CUDA-for-WSL2. Requires the official Ollama
  #   installer (not the snap — snap confinement blocks /dev/nvidia* access).
  #   Install: curl -fsSL https://ollama.com/install.sh | sh
  #   Verify: ollama ps — look for non-zero "Size VRAM" after loading a model.
  #   Set 0 to force CPU; omit / set -1 to let Ollama auto-select full GPU.
  #   Per-profile options.num_gpu overrides this global knob.
  num_gpu: -1

  # How many consecutive low-score reruns (fidelity OR genre below threshold)
  # trigger an automatic model escalation for that stage.
  # Escalation promotes the stage's profile one tier: fast → quality → quality_high.
  # The counter resets after each escalation, so each tier gets this many attempts.
  # Set to 0 to disable gradual escalation entirely.
  escalate_after: 3

  # If a score is this many points below its threshold, escalate the model
  # immediately on the next rerun — don't wait for escalate_after iterations.
  # Example: threshold=70, gap=20 → any score below 50 triggers instant escalation.
  # The fidelity verdict bands are: >=85 aligned, 70-84 mostly-aligned,
  # 50-69 drifting, <50 misaligned — so the default catches the "misaligned" band.
  # Set to 0 to disable immediate escalation (fall back to gradual only).
  escalate_score_gap: 20

# Qwen3 requires a newer Ollama than 0.6.5. The update script checks this and
# tells you how to upgrade if needed. (Soft floor; updater always pulls latest.)
min_ollama_version: "0.7.0"

profiles:
  # Fast tier — qwen3:4b (2.5 GB). Fits entirely in the RTX 2070 8 GB VRAM
  # with plenty of room left. Expect ~60–100 tok/s on GPU vs ~10 tok/s on CPU.
  fast:
    model: qwen3:4b
    fallbacks: [qwen2.5:latest, mistral:7b-instruct, phi3:mini]
    options:
      temperature: 0.7
      num_ctx: 8192     # 8 GB VRAM — 4B model leaves ~5 GB headroom for KV cache

  # Quality tier — qwen3:8b (5.2 GB). Fits entirely in VRAM with ~2.8 GB spare
  # for KV cache. Expect ~30–50 tok/s on GPU. Best general-purpose tier.
  quality:
    model: qwen3:8b
    fallbacks: [llama3:8b, qwen2:7b-instruct-q5_K_M, qwen2.5:latest]
    options:
      temperature: 0.8
      num_ctx: 8192     # safe at 8 GB VRAM with qwen3:8b (5.2 GB model)

  # Thinking tier — qwen3:14b with reasoning traces enabled. At ~8.9 GB it fits
  # ~90% in VRAM (8 GB GPU + ~0.9 GB CPU), so it's nearly full-GPU. Significantly
  # better synthesis than 8b — the storyboard, screenplay, and structure stages
  # fuse many upstream artifacts and gain the most from extra parameters + CoT.
  # Expect ~20–25 tok/s on this GPU. Pull: ollama pull qwen3:14b
  thinking:
    model: qwen3:14b
    fallbacks: [qwen3:8b, qwen3:4b, qwen2.5:latest]
    options:
      temperature: 0.7
      num_ctx: 16384    # 23 GB RAM + mostly-GPU: large context fits; helps storyboard
    think: true         # per-profile override — always enable reasoning for this tier

  # High-quality tier — qwen3:30b. At ~19 GB it splits across 8 GB VRAM + ~11 GB
  # CPU RAM (22 GB available — comfortable). Expect ~7–9 tok/s; slow but the best
  # quality available on this hardware. Escalation target after thinking tier fails.
  # Has built-in thinking (think: true below) for best instruction-following.
  # Pull: ollama pull qwen3:30b  (~19 GB download)
  # Vision fallback: gemma3:27b (~17 GB, vision-capable) if qwen3:30b not pulled.
  quality_high:
    model: qwen3:30b
    fallbacks: [gemma3:27b, gemma3:12b, qwen3:8b]
    options:
      temperature: 0.8
      num_ctx: 8192     # balanced: enough context without blowing the CPU-RAM KV cache
    think: true

# Default profile each agent uses (override per run with `--profile`).
# thinking tier for stages that synthesise many upstream artifacts with structural
# reasoning (structure, storyboard). Screenplay is creative writing + Fountain
# formatting — quality prose wins over chain-of-thought there.
agent_profiles:
  structure:       thinking
  characters:      fast
  casting:         fast
  scenes:          fast
  soundscape:      fast
  visuals:         fast
  cinematography:  fast
  storyboard:      thinking
  screenplay:      quality
  fidelity:        quality
  genre:           quality
  moodboard:       quality
