# Reel Factory Pipeline Configuration

# LLM Provider Mode: local_first | cloud_first | local_only | cloud_only
# local_first (default): Use Ollama local models, fall back to cloud APIs
# cloud_first: Use OpenAI/Anthropic, fall back to Ollama
# local_only: Only use local models (fully offline, no API keys needed)
# cloud_only: Only use cloud APIs (requires API keys)
llm_mode: local_only  # Switches to local_first automatically if API keys are set

# Local model assignments per stage (used when Ollama is available)
# These are pulled automatically on first run via: reel-factory models pull
local_models:
  screenplay: llama3:8b-instruct-q5_K_M
  character_design: llama3:8b-instruct-q5_K_M
  genre_style: mistral:7b-instruct-q5_K_M
  visual_rendering: mistral:7b-instruct-q5_K_M
  audio_music: mistral:7b-instruct-q5_K_M
  effects_filters: qwen2:7b-instruct-q5_K_M
  assembly: phi3:mini
  review: llama3:8b-instruct-q5_K_M

# Cloud model defaults (used as fallback or when cloud_first/cloud_only)
cloud_models:
  screenplay_model: gpt-4o
  character_model: gpt-4o
  image_gen_model: flux-1.1-pro
  voice_model: elevenlabs-v2
  music_model: suno-v4
  video_renderer: runway-gen3
  review_model: gpt-4o

# User interaction mode: prompt | auto | minimal
user_interaction: prompt
output_format: vertical_9_16
max_iterations: 3

# Stage-level intervention timeouts (seconds)
stage_timeouts:
  screenplay: 45
  character_design: 30
  genre_style: 20
  visual_rendering: 60
  audio_music: 30
  effects_filters: 20
  assembly: 15
  review: 60

# Minimum confidence to auto-approve (per stage)
auto_approve_thresholds:
  screenplay: 0.7
  character_design: 0.6
  genre_style: 0.8
  visual_rendering: 0.5
  audio_music: 0.6
  effects_filters: 0.8
  assembly: 0.9
  review: 0.5

# Character rendering configuration
character_rendering:
  default_mode: animated
  available_modes:
    - animated
    - talking_head
    - stylized

# Genre presets
genre_presets:
  comedy:
    pacing: fast
    color_palette: bright
    music_style: upbeat
    transitions: [cut, whip]
    filter: vibrant
  drama:
    pacing: moderate
    color_palette: warm
    music_style: emotional
    transitions: [dissolve, fade]
    filter: cinematic
  horror:
    pacing: slow_build
    color_palette: dark
    music_style: tense
    transitions: [smash_cut, flicker]
    filter: desaturated
  action:
    pacing: fast
    color_palette: high_contrast
    music_style: energetic
    transitions: [cut, flash]
    filter: sharp

# Token budget limits
token_limits:
  max_per_stage: 50000
  max_per_pipeline_run: 300000
  warn_at_percentage: 80

# Ollama settings
ollama:
  host: http://localhost:11434
  timeout_seconds: 300
  auto_pull: true  # Automatically pull missing models on first run
  auto_refresh: true  # Refresh models on each run (upgrade deprecated, remove obsolete)
